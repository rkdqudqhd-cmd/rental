<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>촬영장비 렌탈 가격 비교</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#111;font-size:14px}
.wrap{max-width:760px;margin:0 auto;padding:1.25rem 1rem 3rem}
h1{font-size:20px;font-weight:600;margin-bottom:3px}
.sub{font-size:11px;color:#666;margin-bottom:.9rem}
.tabs{display:flex;border-bottom:1px solid #ddd;margin-bottom:1rem;gap:0}
.tb{padding:9px 16px;font-size:13px;cursor:pointer;background:none;border:none;color:#888;border-bottom:2px solid transparent}
.tb.on{color:#111;font-weight:600;border-bottom-color:#111}
/* search card */
.scard{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1rem;margin-bottom:1rem}
.catg{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:.85rem}
.ct{padding:6px 4px;border-radius:8px;border:1px solid #ddd;font-size:11px;cursor:pointer;background:#fff;text-align:center;line-height:1.35;transition:.12s}
.ct span:first-child{display:block;font-size:14px;margin-bottom:1px}
.ct.on{background:#111;color:#fff;border-color:#111}
.frow{display:grid;grid-template-columns:1fr 1fr 68px auto;gap:7px;align-items:end;margin-bottom:6px}
.fl label{display:block;font-size:11px;color:#888;margin-bottom:3px}
.fl select,.fl input{width:100%;padding:7px 9px;border:1px solid #ddd;border-radius:8px;font-size:12px;background:#fff}
.btn{padding:8px 14px;background:#111;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
.mets{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:.9rem}
.met{background:#f8f8f8;border-radius:8px;padding:.6rem .85rem}
.met .ml{font-size:10px;color:#888;margin-bottom:2px}
.met .mv{font-size:16px;font-weight:600}
.tog-row{display:flex;align-items:center;gap:8px;margin-bottom:.55rem}
.tog-row label{font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px}
.tog{position:relative;width:32px;height:18px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.sl{position:absolute;inset:0;background:#ccc;border-radius:20px;transition:.18s}
.sl:before{content:'';position:absolute;height:12px;width:12px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.18s}
.tog input:checked+.sl{background:#5B4FCF}
.tog input:checked+.sl:before{transform:translateX(14px)}
.filt{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.55rem;align-items:center}
.filt .fl0{font-size:11px;color:#888}
.tg{padding:3px 9px;border-radius:20px;border:1px solid #ddd;font-size:11px;cursor:pointer;background:#fff;transition:.1s}
.tg.on{background:#111;color:#fff;border-color:#111}
.sr{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.sr span{font-size:11px;color:#888}
.ss{padding:3px 8px;border:1px solid #ddd;border-radius:6px;font-size:11px;background:#fff}
.rcard{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:.8rem .95rem;margin-bottom:6px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;transition:.1s}
.rcard:hover{border-color:#aaa}
.rcard.best{border:2px solid #1D9E75}
.rn{font-size:13px;font-weight:600;margin-bottom:2px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.rm{font-size:10px;color:#888;display:flex;gap:8px;flex-wrap:wrap;margin-bottom:2px}
.rnote{font-size:10px;color:#666}
.al{font-size:13px;font-weight:600;color:#111;text-decoration:none}
.al:hover{color:#1D5FA5;text-decoration:underline}
.bg{display:inline-block;padding:1px 6px;border-radius:20px;font-size:9px;font-weight:600}
.b0{background:#E1F5EE;color:#0F6E56}.b1{background:#E6F1FB;color:#185FA5}
.b2{background:#FAEEDA;color:#854F0B}.b3{background:#EEEDFE;color:#3C3489}
.pb{text-align:right;min-width:100px}
.po{font-size:10px;color:#bbb;text-decoration:line-through}
.pm{font-size:17px;font-weight:700}
.pm.std{color:#5B4FCF}
.ps{font-size:10px;color:#888}
.nores{text-align:center;padding:2rem;color:#999;font-size:12px}
/* connector */
.conn-search{width:100%;padding:11px 14px;border:1px solid #ddd;border-radius:12px;font-size:14px;background:#fff;margin-bottom:.75rem}
.conn-hint{font-size:11px;color:#888;margin-bottom:.85rem}
.gcard{background:#fff;border:1px solid #e0e0e0;border-radius:12px;margin-bottom:.65rem;overflow:hidden}
.ghead{padding:.85rem 1rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:.1s}
.ghead:hover{background:#f8f8f8}
.ghtitle{font-size:14px;font-weight:600}
.ghcat{font-size:10px;color:#888;margin-top:2px}
.garrow{font-size:12px;color:#bbb;transition:.15s}
.gcard.open .garrow{transform:rotate(180deg)}
.gbody{display:none;padding:.85rem 1rem 1rem;border-top:1px solid #eee}
.gcard.open .gbody{display:block}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;padding:.5rem 0 .85rem}
.si .sk{font-size:10px;color:#888;margin-bottom:1px}
.si .sv{font-size:12px;font-weight:600}
.csec{margin-bottom:.7rem}
.ctitle{font-size:10px;font-weight:600;color:#666;letter-spacing:.06em;text-transform:uppercase;margin-bottom:.4rem;display:flex;align-items:center;gap:5px}
.cdot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.cpills{display:flex;flex-wrap:wrap;gap:5px}
.cp{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid}
.pw{background:#FAEEDA;color:#633806;border-color:#FAC775}
.sig{background:#E6F1FB;color:#042C53;border-color:#85B7EB}
.aud{background:#E1F5EE;color:#04342C;border-color:#5DCAA5}
.vid{background:#EEEDFE;color:#26215C;border-color:#AFA9EC}
.dat{background:#FCEBEB;color:#501313;border-color:#F09595}
.mnt{background:#F1EFE8;color:#2C2C2A;border-color:#B4B2A9}
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:.6rem;padding-top:.5rem;border-top:1px solid #eee}
.li{font-size:10px;color:#888;display:flex;align-items:center;gap:4px}
.disc{font-size:10px;color:#aaa;margin-top:.85rem;padding-top:.6rem;border-top:1px solid #eee}
@media(max-width:540px){
  .frow{grid-template-columns:1fr 1fr}
  .rcard{grid-template-columns:1fr}
  .pb{text-align:left}
  .mets{grid-template-columns:1fr 1fr}
  .sgrid{grid-template-columns:1fr}
}
</style>
</head>

<div class="wrap">
<h1>촬영 장비 렌탈 가격 비교</h1>
<p class="sub">국내 14개 렌탈샵 · 장비 스펙 & 커넥터 정보 · 수집일: 2026년 4월</p>

<div class="tabs">
  <button class="tb on" onclick="switchTab('price',this)">💰 가격 비교</button>
  <button class="tb" onclick="switchTab('conn',this)">🔌 커넥터 & 스펙</button>
</div>

<!-- 가격 비교 -->
<div id="tv-price">
  <div class="scard">
    <div class="catg" id="catg"></div>
    <div class="frow">
      <div class="fl"><label>장비</label><select id="gsel" onchange="doSearch()"></select></div>
      <div class="fl"><label>샵 검색</label><input id="kw" placeholder="렌탈샵명" oninput="doRender()"/></div>
      <div class="fl"><label>기간(일)</label><input type="number" id="days" value="1" min="1" max="30" onchange="doSearch()"/></div>
      <div class="fl" style="align-self:end"><button class="btn" onclick="doSearch()">비교</button></div>
    </div>
    <div style="text-align:right;font-size:10px;color:#aaa">* 바디 단품 기준. 풀세트는 다를 수 있음</div>
  </div>
  <div id="mets" class="mets" style="display:none">
    <div class="met"><div class="ml">비교 샵</div><div class="mv" id="mcnt">-</div></div>
    <div class="met"><div class="ml">최저가</div><div class="mv" id="mmin">-</div></div>
    <div class="met"><div class="ml">최고가</div><div class="mv" id="mmax">-</div></div>
  </div>
  <div id="fw" style="display:none">
    <div class="tog-row">
      <label><span class="tog"><input type="checkbox" id="stog" onchange="doRender()"><span class="sl"></span></span>학생 할인가 보기</label>
      <span id="snote" style="font-size:10px;color:#5B4FCF;display:none">할인 없는 샵은 일반가</span>
    </div>
    <div class="filt">
      <span class="fl0">필터:</span>
      <span class="tg on" onclick="setFilt(this,'전체')">전체</span>
      <span class="tg" onclick="setFilt(this,'당일수령')">당일수령</span>
      <span class="tg" onclick="setFilt(this,'택배가능')">택배가능</span>
      <span class="tg" onclick="setFilt(this,'보증금없음')">보증금없음</span>
      <span class="tg" onclick="setFilt(this,'학생할인')">학생할인만</span>
    </div>
    <div class="sr">
      <span id="rlbl"></span>
      <select class="ss" id="ssort" onchange="doRender()"><option value="price">가격 낮은순</option><option value="name">이름순</option></select>
    </div>
  </div>
  <div id="res"></div>
  <p class="disc">학생할인: 제이포 30% · SLR렌트 25% · 칠렌탈·빌리지·수상한렌탈·480p 20% · 예약 전 각 사이트에서 최종 확인</p>
</div>

<!-- 커넥터 & 스펙 -->
<div id="tv-conn" style="display:none">
  <input class="conn-search" id="ckw" placeholder="🔍  장비명 검색  예) FX6, ALEXA, MixPre, Aputure 600D, DJI Mic ..." oninput="renderConn()"/>
  <p class="conn-hint">카드를 클릭하면 스펙과 커넥터 정보가 펼쳐집니다</p>
  <div id="conn-list"></div>
</div>
</div>

const rnd=n=>Math.round(n);

function switchTab(t,el){
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));el.classList.add('on');
  document.getElementById('tv-price').style.display=t==='price'?'block':'none';
  document.getElementById('tv-conn').style.display=t==='conn'?'block':'none';
}
function buildCat(){
  document.getElementById('catg').innerHTML=Object.entries(CATS).map(([k,v])=>
    `<span class="ct${k===curCat?' on':''}" onclick="setCat(this,'${k}')"><span>${v.i}</span><span>${v.l}</span></span>`
  ).join('');
}
function buildGear(){
  document.getElementById('gsel').innerHTML=CATS[curCat].g.map(g=>`<option value="${g.id}">${g.n}</option>`).join('');
}
function setCat(el,cat){
  document.querySelectorAll('.ct').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');curCat=cat;buildGear();document.getElementById('kw').value='';doSearch();
}
function doSearch(){
  const gear=document.getElementById('gsel').value;
  const days=parseInt(document.getElementById('days').value)||1;
  curData=SHOPS.map(s=>{
    const base=s.p[gear];if(base==null)return null;
    return{...s,gear,days,base,note:(s.n&&s.n[gear])||''};
  }).filter(Boolean);
  document.getElementById('mets').style.display=curData.length?'grid':'none';
  document.getElementById('fw').style.display=curData.length?'block':'none';
  doRender();
}
function setFilt(el,f){
  document.querySelectorAll('.tg').forEach(t=>t.classList.remove('on'));el.classList.add('on');curFilt=f;doRender();
}
function doRender(){
  const days=parseInt(document.getElementById('days').value)||1;
  const sort=document.getElementById('ssort').value;
  const kw=document.getElementById('kw').value.toLowerCase();
  const stuOn=document.getElementById('stog').checked;
  document.getElementById('snote').style.display=stuOn?'inline':'none';
  let data=curData.map(s=>{
    const disc=stuOn&&s.sd>0?s.sd:0;
    const eDay=rnd(s.base*(1-disc));
    return{...s,eDay,total:eDay*days,disc};
  });
  if(curFilt==='학생할인') data=data.filter(s=>s.sd>0);
  else if(curFilt!=='전체') data=data.filter(s=>s.tags&&s.tags.includes(curFilt));
  if(kw) data=data.filter(s=>s.nm.toLowerCase().includes(kw)||(s.note&&s.note.toLowerCase().includes(kw)));
  if(sort==='price') data.sort((a,b)=>a.total-b.total);
  else data.sort((a,b)=>a.nm.localeCompare(b.nm));
  document.getElementById('rlbl').textContent=`${data.length}개 렌탈샵`;
  if(data.length){
    const ps=data.map(s=>s.total);
    document.getElementById('mcnt').textContent=data.length+'개';
    document.getElementById('mmin').textContent=fmt(Math.min(...ps));
    document.getElementById('mmax').textContent=fmt(Math.max(...ps));
  }
  const el=document.getElementById('res');
  if(!data.length){el.innerHTML='<div class="nores">조건에 맞는 렌탈샵이 없습니다.</div>';return;}
  const minP=Math.min(...data.map(s=>s.total));
  el.innerHTML=data.map(s=>{
    const isBest=s.total===minP,stuApp=stuOn&&s.disc>0;
    return`<div class="rcard${isBest?' best':''}">
      <div>
        <div class="rn"><a class="al" href="${s.url}" target="_blank">${s.nm}</a>
          ${isBest?'<span class="bg b0">최저가</span>':''}
          ${s.tags.includes('당일수령')?'<span class="bg b1">당일수령</span>':''}
          ${s.tags.includes('보증금없음')?'<span class="bg b2">보증금없음</span>':''}
          ${s.sd>0?`<span class="bg b3">학생 ${Math.round(s.sd*100)}%↓</span>`:''}
        </div>
        <div class="rm"><span>${s.loc}</span><span>${s.dep}</span></div>
        ${s.note?`<div class="rnote">${s.note}</div>`:''}
      </div>
      <div class="pb">
        ${stuApp?`<div class="po">${fmt(s.base*days)}</div>`:''}
        <div class="pm${stuApp?' std':''}">${fmt(s.total)}</div>
        <div class="ps">${days}일·일 ${fmt(s.eDay)}${stuApp?` (${Math.round(s.disc*100)}% 할인)`:''}</div>
      </div>
    </div>`;
  }).join('');
}
function renderConn(){
  const kw=(document.getElementById('ckw').value||'').toLowerCase().trim();
  const all=Object.entries(GDB);
  const filtered=kw?all.filter(([,g])=>g.n.toLowerCase().includes(kw)||g.cat.toLowerCase().includes(kw)):all;
  if(!filtered.length){document.getElementById('conn-list').innerHTML='<div class="nores">검색 결과가 없습니다.</div>';return;}
  document.getElementById('conn-list').innerHTML=filtered.map(([id,g])=>{
    const isOpen=id===openGear;
    const specs=Object.entries(g.spec).map(([k,v])=>
      `<div class="si"><div class="sk">${k}</div><div class="sv">${v}</div></div>`
    ).join('');
    const conns=Object.entries(CMAP).map(([key,{l,cls,col}])=>{
      const items=g[key]||[];if(!items.length)return'';
      return`<div class="csec"><div class="ctitle"><span class="cdot" style="background:${col}"></span>${l}</div>
        <div class="cpills">${items.map(i=>`<span class="cp ${cls}">${i}</span>`).join('')}</div></div>`;
    }).join('');
    const legend=Object.values(CMAP).map(({l,col})=>`<span class="li"><span class="cdot" style="background:${col}"></span>${l}</span>`).join('');
    return`<div class="gcard${isOpen?' open':''}">
      <div class="ghead" onclick="toggleG('${id}')">
        <div><div class="ghtitle">${g.n}</div><div class="ghcat">${g.cat}</div></div>
        <span class="garrow">▼</span>
      </div>
      <div class="gbody"><div class="sgrid">${specs}</div>${conns}<div class="legend">${legend}</div></div>
    </div>`;
  }).join('');
}
function toggleG(id){openGear=openGear===id?null:id;renderConn();}
buildCat();buildGear();doSearch();renderConn();
</script>
</body>
</html>
